<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon/favicon.icocle" type="image/x-icon">
    <title>L.A | Cronômetro</title>
</head>

<body>
    <!-- wrapper -->
    <div class="wrapper">
        <!-- conteúdo do cronômetro -->
        <h1>Cronômetro</h1>
        <!-- tempo do cronômetro -->
        <div class="timer">
            <div class="time" id="minutes">00</div>
            <div class="separar">:</div>
            <div class="time" id="seconds">00</div>
            <div class="separar">:</div>
            <div class="time" id="milliseconds">000</div>
        </div>
        <!-- botões do cronômetro -->
        <div class="container-btn">
            <button class="btn" id="startBtn">Iniciar</button>
            <button class="btn" id="pauseBtn">Pausar</button>
            <button class="btn" id="resetBtn">Resetar</button>
        </div>
    </div>
    <!-- fim wrapper -->

    <script src="script.js"></script>
</body>

</html>
